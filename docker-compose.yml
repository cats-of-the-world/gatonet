services:

  # VPN tunnel
  # All torrent traffic is routed through gluetun.
  # If the VPN drops, qBittorrent loses internet (kill-switch).
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - OPENVPN_USER=${OPENVPN_USER:-}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
    # Ports bind to 0.0.0.0 so the stack survives DHCP IP changes.
    # Access is restricted to LAN by the firewall rules set in setup.sh.
    ports:
      - "8080:8080"
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    networks:
      - arr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # Torrent client (runs inside gluetun's VPN namespace)
  # Mounted at /data (same root as Radarr/Sonarr) so all containers agree on
  # file paths and Radarr/Sonarr can import without remote path mappings.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - ${DATA_PATH}:/data
    restart: unless-stopped

  # Cloudflare bypass (used by Prowlarr for CF-protected indexers)
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    security_opt:
      - no-new-privileges:true
    environment:
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    networks:
      - arr
    restart: unless-stopped

  # Indexer aggregator
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - "9696:9696"
    networks:
      - arr
    restart: unless-stopped

  # Movie automation
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${DATA_PATH}:/data
    ports:
      - "7878:7878"
    networks:
      - arr
    restart: unless-stopped

  # TV show automation
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${DATA_PATH}:/data
    ports:
      - "8989:8989"
    networks:
      - arr
    restart: unless-stopped

  # Media server
  # Isolated on its own network  - cannot reach the arr stack even if compromised.
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${DATA_PATH}/media:/data
    ports:
      - "8096:8096"
    networks:
      - stream
    restart: unless-stopped

networks:
  # arr stack - prowlarr, radarr, sonarr, gluetun (qbittorrent uses gluetun's namespace)
  arr:
    driver: bridge
  # stream - jellyfin only, isolated from the arr stack
  stream:
    driver: bridge
