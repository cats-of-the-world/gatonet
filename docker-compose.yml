services:

  # ── VPN tunnel ──────────────────────────────────────────────────────────────
  # All torrent traffic is routed through gluetun.
  # If the VPN drops, qBittorrent loses internet (kill-switch).
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      # WireGuard (Mullvad, NordVPN, ProtonVPN, etc.)
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      # OpenVPN providers — uncomment and remove wireguard lines if needed
      # - OPENVPN_USER=${OPENVPN_USER}
      # - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
    # qBittorrent's web UI is exposed through gluetun's network namespace
    ports:
      - "${LAN_IP}:8080:8080"
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    networks:
      - media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Torrent client (runs inside gluetun's VPN namespace) ────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - ${DOWNLOADS_PATH}:/downloads
    restart: unless-stopped

  # ── Indexer aggregator ───────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - "${LAN_IP}:9696:9696"
    networks:
      - media
    restart: unless-stopped

  # ── Movie automation ─────────────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${MEDIA_PATH}/movies:/movies
    ports:
      - "${LAN_IP}:7878:7878"
    networks:
      - media
    restart: unless-stopped

  # ── TV show automation ───────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${MEDIA_PATH}/tv:/tv
    ports:
      - "${LAN_IP}:8989:8989"
    networks:
      - media
    restart: unless-stopped

  # ── Media server ─────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${MEDIA_PATH}/movies:/data/movies:ro
      - ${MEDIA_PATH}/tv:/data/tv:ro
    ports:
      - "${LAN_IP}:8096:8096"
    networks:
      - media
    restart: unless-stopped

networks:
  media:
    driver: bridge
